<!DOCTYPE html>
<html>
<head>
<title>Expense Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Expense Tracker 💰</h1>

<h2 id="balance">Balance: ₹0</h2>

<div class="summary">
<p>Income: ₹<span id="income">0</span></p>
<p>Expense: ₹<span id="expense">0</span></p>
</div>

<div class="form">

<input type="text" id="text" placeholder="Enter description">

<input type="number" id="amount" placeholder="Enter amount (+ income, - expense)">

<button onclick="addTransaction()">Add Transaction</button>

</div>

<h3>History</h3>

<ul id="list"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
